version: "3.9"

services:

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - loan_data:/data        # shared persistent volume for sessions + reports
    environment:
      - DATA_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-openai/gpt-4o-mini}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - CREWAI_TRACING_ENABLED=false
    networks:
      - loan_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  streamlit:
    build: .
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      # Docker's internal DNS resolves the "api" service name to its container IP
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - loan_net
    restart: unless-stopped

volumes:
  loan_data:
    driver: local

networks:
  loan_net:
    driver: bridge
